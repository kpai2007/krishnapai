<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

h1{
    position:absolute;
    width:100%;
    top:10px;
    z-index:10;
}

#score{
    position:absolute;
    top:60px;
    width:100%;
    font-size:24px;
    z-index:10;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<h1>Stack Game</h1>
<div id="score">Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stack = [{
    x: canvas.width/2 - 100,
    y: canvas.height - 60,
    width: 200,
    height: 30
}];

let current = {
    x: 0,
    y: canvas.height - 90,
    width: 200,
    height: 30,
    dir: 1,
    speed: 5
};

let score = 0;
let gameOver = false;

function drawBlock(block,color){
    ctx.fillStyle=color;
    ctx.fillRect(block.x,block.y,block.width,block.height);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<stack.length;i++){
        drawBlock(stack[i],`hsl(${i*25},80%,60%)`);
    }

    if(!gameOver){
        drawBlock(current,"white");
    }
}

function update(){
    if(gameOver) return;

    current.x += current.speed * current.dir;

    if(current.x <= 0 || current.x + current.width >= canvas.width){
        current.dir *= -1;
    }
}

function placeBlock(){

    if(gameOver) return;

    const top = stack[stack.length-1];

    const overlap =
        Math.min(current.x + current.width, top.x + top.width)
        - Math.max(current.x, top.x);

    if(overlap <= 0){
        gameOver = true;
        document.getElementById("score").innerHTML =
        "Game Over! Final Score: " + score + "<br>Refresh to play again";
        return;
    }

    current.width = overlap;
    current.x = Math.max(current.x, top.x);

    stack.push({
        x: current.x,
        y: current.y,
        width: current.width,
        height: current.height
    });

    score++;
    document.getElementById("score").innerText =
    "Score: " + score;

    current = {
        x: current.dir === 1 ? 0 : canvas.width-current.width,
        y: current.y - 30,
        width: current.width,
        height: 30,
        dir: current.dir * -1,
        speed: current.speed + 0.2
    };

    if(current.y < 100){
        for(let block of stack){
            block.y += 30;
        }
        current.y += 30;
    }
}

window.addEventListener("click", placeBlock);
window.addEventListener("keydown", e=>{
    if(e.code==="Space"){
        placeBlock();
    }
});

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
